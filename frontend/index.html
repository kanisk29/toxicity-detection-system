<!DOCTYPE html>
<html>
<head>
  <title>Toxicity Classifier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>History</h2>
    <div id="history"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h1>Toxicity Classifier</h1>
      <button id="themeToggle">🌙</button>
    </div>

    <textarea id="text" placeholder="Enter text..."></textarea>

    <div class="controls">
      <select id="model">
        <option value="gru">GRU</option>
        <option value="lstm">LSTM</option>
        <option value="cnn">CNN</option>
      </select>
      <button onclick="predict()">Analyze</button>
    </div>

    <div id="result" class="result"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
