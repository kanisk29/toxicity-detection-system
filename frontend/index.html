<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ToxScan — AI Toxicity Detector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg"></canvas>
<div class="grain"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="layout">

  <!-- LEFT: Main Analyzer -->
  <div class="panel main-panel">
    <div class="panel-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ToxScan</span>
      </div>
      <div class="tagline">Toxicity Detection System</div>
    </div>

    <div class="input-area">
      <div class="textarea-wrap">
        <textarea id="inputText" placeholder="Paste or type a comment to analyze..."></textarea>
        <div class="char-count"><span id="charCount">0</span> chars</div>
      </div>
      <button id="analyzeBtn">
        <span class="btn-text">Analyze</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>

    <div id="loader">
      <div class="loader-track"><div class="loader-bar"></div></div>
      <span class="loader-label">Scanning<span class="dots">...</span></span>
    </div>

    <div id="results" class="results-area"></div>
  </div>

  <!-- RIGHT: History Panel -->
  <div class="panel history-panel">
    <div class="history-header">
      <span class="history-title">History</span>
      <button class="clear-btn" id="clearBtn">✕ Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">
        <span class="empty-icon">◌</span>
        <p>No analyses yet</p>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
